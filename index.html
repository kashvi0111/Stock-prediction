<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Space Grotesk',sans-serif;
  background:#0a0e14;
  color:#fff;
}

/* ── HERO WITH IMAGE ── */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px;

  background:
    linear-gradient(rgba(10,14,20,0.75), rgba(10,14,20,0.95)),
    url('https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&w=1600&q=80');
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
}

/* zoom animation */
.hero::before{
  content:'';
  position:absolute;
  inset:0;
  background:inherit;
  z-index:-1;
  animation:zoom 18s ease-in-out infinite alternate;
}

@keyframes zoom{
  from{transform:scale(1)}
  to{transform:scale(1.1)}
}

/* fade animation */
.fade-up{
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 1s forwards;
}

.fade-up:nth-child(1){animation-delay:0.2s}
.fade-up:nth-child(2){animation-delay:0.4s}
.fade-up:nth-child(3){animation-delay:0.6s}
.fade-up:nth-child(4){animation-delay:0.8s}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0)}
}

/* text */
.tag{
  font-size:0.75rem;
  letter-spacing:2px;
  color:#00d4ff;
  margin-bottom:20px;
}

h1{
  font-size:clamp(2.8rem,6vw,5rem);
  line-height:1.1;
}

h1 span{
  background:linear-gradient(90deg,#00d4ff,#00e676);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  margin:20px 0 40px;
  color:#c0d0e0;
  max-width:500px;
  line-height:1.6;
}

/* buttons */
.btns{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
}

.btn{
  padding:14px 34px;
  border-radius:10px;
  font-weight:600;
  text-decoration:none;
  transition:0.3s;
}

.primary{
  background:#00d4ff;
  color:#000;
}

.primary:hover{
  transform:translateY(-4px) scale(1.05);
  box-shadow:0 10px 30px rgba(0,212,255,0.4);
}

.secondary{
  border:1px solid #2a3b4d;
  color:#fff;
}

.secondary:hover{
  background:#16202b;
  transform:translateY(-4px);
}
</style>
</head>

<body>

<section class="hero">

  <div class="tag fade-up">AI POWERED • REAL-TIME INSIGHTS</div>

  <h1 class="fade-up">
    Stock <span>Intelligence</span><br>
    Platform
  </h1>

  <p class="sub fade-up">
    Real-time stock analytics, AI predictions, and powerful insights —
    everything you need to trade smarter and faster.
  </p>

  <div class="btns fade-up">
    <a href="dashboard.html" class="btn primary">
      Get Started →
    </a>

    <a href="#features" class="btn secondary">
      Explore Features
    </a>
  </div>

</section>

</body>
</html>
